name: Deploy to Raspberry Pi

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'ID del workflow di build da deployare (lascia vuoto per usare l''ultimo build su main)'
        required: false
        default: ''

permissions:
  actions: read

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Resolve build run ID
        id: resolve
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            RUN_ID=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?status=success&branch=main&per_page=1" \
              | jq -r '.workflow_runs[0].id')
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact from build workflow
        uses: actions/download-artifact@v4
        with:
          name: pi-touch-date-linux-arm64
          path: ./deploy
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.resolve.outputs.run_id }}

      - name: Secrets injection
        run: |  
          echo 'GEOCODE_API_KEY=${{ secrets.GEOCODE_API_KEY }}' > /home/pi/.secrets.env
          cat /home/pi/.secrets.env

      - name: Deploy and Restart Service
        run: |
          sudo systemctl stop pi-touch-date.service || true
          mkdir -p /home/pi/pi-touch-date
          cp -rf ./deploy/* /home/pi/pi-touch-date/
          chmod +x /home/pi/pi-touch-date/PiTouchDate
          sudo systemctl start pi-touch-date.service
          sleep 10
          sudo systemctl status pi-touch-date.service
          sudo journalctl -u pi-touch-date.service --no-pager --since "5 minutes ago"
